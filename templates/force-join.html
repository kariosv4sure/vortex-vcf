<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Join Channel · Vortex VCF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            padding: 16px;
        }

        /* Background image */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/static/bg.png') center/cover no-repeat;
            opacity: 0.4;
            z-index: -1;
        }

        .card {
            max-width: 360px;
            width: 100%;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lock-icon {
            text-align: center;
            margin-bottom: 20px;
        }

        .lock-icon span {
            font-size: 2.5rem;
            opacity: 0.8;
        }

        .message {
            background: rgba(0, 136, 204, 0.1);
            border: 1px solid rgba(0, 136, 204, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .message p {
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.9;
        }

        .channel-btn {
            display: block;
            width: 100%;
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        .channel-btn:active {
            transform: scale(0.98);
            background: #0077b3;
        }

        .verify-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 16px 20px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .verify-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer-note {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* No mention of bypass - only join channel */
    </style>
</head>
<body>
    <div class="card">
        <div class="lock-icon">
            <span>🔒</span>
        </div>
        
        <h1>Vortex VCF</h1>
        <div class="subtitle">channel access required</div>

        <div class="message">
            <p>Join our Telegram channel to access the Vortex VCF form</p>
        </div>

        <a href="https://t.me/vortexvcf" target="_blank" class="channel-btn">
            📱 Join @vortexvcf
        </a>

        <button class="verify-btn" id="verifyBtn" onclick="verifyJoin()">
            I've joined · Continue
        </button>

        <div class="footer-note">
            channel members only
        </div>
    </div>

    <script>
        async function verifyJoin() {
            const btn = document.getElementById('verifyBtn');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = 'Verifying <span class="spinner"></span>';
            
            try {
                const response = await fetch('/verify-join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    alert('Please join the channel first');
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (error) {
                alert('Error. Please try again.');
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
