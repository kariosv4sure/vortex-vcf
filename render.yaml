services:
  - type: web
    name: vortex-vcf
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vortex-vcf-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: CyberVRTX101
      - key: ADMIN_PASSWORD
        value: $CyberVRTX@#10*2
      - key: TELEGRAM_CHANNEL_LINK
        value: https://t.me/vortexvcf
      - key: MAX_SUBMISSIONS_PER_DAY
        value: 3
      - key: FLASK_DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: vortex-vcf-db
    databaseName: vortex_vcf_db
    user: vortex_user
    plan: free
